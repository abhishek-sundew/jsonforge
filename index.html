<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JSON Forge</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="favicon" href="./favicon.ico">
  <style>
    html, body { height: 100%; overflow: hidden; }
    textarea { resize: none; font-family: monospace; font-size: 13px; line-height: 1.5; }
    .panel-height { height: calc(100vh - 116px); }

    /* Line-number gutter for input textarea */
    .editor-wrap { display: flex; flex: 1 1 auto; overflow: hidden; }
    .line-nums {
      font-family: monospace; font-size: 13px; line-height: 1.5;
      min-width: 40px; text-align: right;
      padding: 8px 6px 8px 4px;
      color: #6c757d; background: inherit;
      border-right: 1px solid #495057;
      user-select: none; overflow: hidden;
      white-space: pre;
    }
    .editor-wrap textarea { flex: 1 1 auto; padding: 8px; border: none !important; outline: none !important; }
    .tree-scroll  { overflow-y: auto; height: 100%; }

    .theme-dark      { background:#0d1117 !important; color:#e6edf3 !important; }
    .theme-dark.line-nums { background:#161b22 !important; color:#484f58 !important; border-color:#30363d !important; }
    .theme-light     { background:#ffffff !important; color:#24292f !important; }
    .theme-light.line-nums { background:#f6f8fa !important; color:#8c959f !important; border-color:#d0d7de !important; }
    .theme-monokai   { background:#272822 !important; color:#f8f8f2 !important; }
    .theme-monokai.line-nums { background:#1e1f1b !important; color:#75715e !important; border-color:#3d3d3d !important; }
    .theme-nord      { background:#2e3440 !important; color:#d8dee9 !important; }
    .theme-nord.line-nums { background:#272c36 !important; color:#616e88 !important; border-color:#3b4252 !important; }
    .theme-solarized { background:#002b36 !important; color:#839496 !important; }
    .theme-solarized.line-nums { background:#01212b !important; color:#5a7b86 !important; border-color:#073642 !important; }
    .tree-ul.root { padding-left: 0; }
    .tree-toggle { cursor: pointer; user-select: none; }
    .tree-toggle .caret { display: inline-block; width: 14px; color: #6c757d; font-size: 10px; transition: transform .15s; }
    .tree-toggle.open .caret { transform: rotate(90deg); }
    .tree-children { padding-left: 20px; border-left: 1px dashed #555; margin-left: 6px; }

    .val-str  { color: #3b9ede; }
    .val-num  { color: #e0a020; }
    .val-bool { color: #e05050; }
    .val-null { color: #e08030; }
    .val-key  { color: #29a88e; }

    /* Editor theme classes */
    .theme-dark      { background:#0d1117 !important; color:#e6edf3 !important; }
    .theme-light     { background:#ffffff !important; color:#24292f !important; }
    .theme-monokai   { background:#272822 !important; color:#f8f8f2 !important; }
    .theme-nord      { background:#2e3440 !important; color:#d8dee9 !important; }
    .theme-solarized { background:#002b36 !important; color:#839496 !important; }

    #modeToggle { width:36px; height:36px; padding:0; display:flex; align-items:center; justify-content:center; }
  </style>
</head>
<body class="d-flex flex-column h-100">

  <!-- Navbar -->
  <nav class="navbar border-bottom px-3 py-2 flex-shrink-0">
    <span class="navbar-brand fw-bold fs-5 mb-0">
      <span class="text-warning">{</span> JSON Forge <span class="text-warning">}</span>
    </span>
    <div class="d-flex align-items-center gap-3">
      <div class="d-flex gap-3 small text-secondary">
        <span id="lineCount">Lines: 0</span>
        <span id="charCount">Chars: 0</span>
      </div>
      <span class="badge text-bg-secondary" id="statusBadge">
        <i class="bi bi-circle-fill me-1"></i><span id="statusText">Waiting</span>
      </span>
      <button class="btn btn-outline-secondary rounded-circle" id="modeToggle" onclick="togglePageMode()" title="Toggle dark/light mode">
        <i class="bi bi-moon-fill" id="modeIcon"></i>
      </button>
    </div>
  </nav>

  <!-- Error Banner -->
  <div id="errorBanner" class="alert alert-danger mb-0 py-2 px-3 rounded-0 border-0 border-bottom border-danger d-none flex-shrink-0">
    <i class="bi bi-exclamation-triangle-fill me-2"></i><span id="errorMsg"></span>
  </div>

  <!-- Main -->
  <div class="container-fluid flex-grow-1 px-3 pt-2 pb-2 overflow-hidden">
    <div class="row g-2 h-100">

      <!-- Left -->
      <div class="col-md-6 d-flex flex-column panel-height">
        <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
          <button class="btn btn-warning btn-sm fw-semibold" onclick="formatJSON()">
            <i class="bi bi-braces me-1"></i>Format
          </button>
          <button class="btn btn-outline-secondary btn-sm" onclick="minifyJSON()">
            <i class="bi bi-dash-square me-1"></i>Minify
          </button>
          <button class="btn btn-outline-secondary btn-sm" id="copyBtn" onclick="copyInput()">
            <i class="bi bi-clipboard me-1"></i>Copy
          </button>
          <button class="btn btn-outline-danger btn-sm" onclick="clearAll()">
            <i class="bi bi-trash me-1"></i>Clear
          </button>
          <button class="btn btn-outline-secondary btn-sm" onclick="document.getElementById('fileInput').click()">
            <i class="bi bi-upload me-1"></i>Upload
          </button>
          <input type="file" id="fileInput" accept=".json,.txt" class="d-none" onchange="uploadFile(event)">
          <button class="btn btn-outline-secondary btn-sm" onclick="pasteFromClipboard()">
            <i class="bi bi-clipboard2-plus me-1"></i>Paste
          </button>
          <div class="ms-auto d-flex align-items-center gap-2">
            <label class="small text-secondary mb-0">Editor</label>
            <select class="form-select form-select-sm border-secondary" style="width:auto" id="themeSelect" onchange="onEditorThemeChange()">
              <option value="auto-dark">Auto (Dark)</option>
              <option value="auto-light">Auto (Light)</option>
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="monokai">Monokai</option>
              <option value="nord">Nord</option>
              <option value="solarized">Solarized</option>
            </select>
          </div>
        </div>

        <div class="card border-secondary flex-grow-1 d-flex flex-column overflow-hidden">
          <div class="card-header border-secondary py-2 px-3">
            <span class="text-warning fw-semibold small"><i class="bi bi-pencil-square me-1"></i>Input JSON</span>
          </div>
          <div class="editor-wrap">
            <div class="line-nums rounded-bottom-start" id="lineNums">1</div>
            <textarea
              id="inputEditor"
              class="form-control border-0 rounded-0 rounded-bottom-end"
              placeholder="Paste or type JSON here..."
              oninput="onInput()"
              onscroll="syncLineScroll()"
              spellcheck="false"
            ></textarea>
          </div>
        </div>
      </div>

      <!-- Right -->
      <div class="col-md-6 d-flex flex-column panel-height">
        <div class="d-flex align-items-center gap-2 mb-2">
          <span class="small text-secondary"><i class="bi bi-diagram-3 me-1"></i>Tree View</span>
          <button class="btn btn-outline-secondary btn-sm" onclick="expandAll()"><i class="bi bi-arrows-expand me-1"></i>Expand All</button>
          <button class="btn btn-outline-secondary btn-sm" onclick="collapseAll()"><i class="bi bi-arrows-collapse me-1"></i>Collapse All</button>
          <span class="badge bg-secondary ms-auto" id="nodeCount">—</span>
        </div>

        <div class="card border-secondary flex-grow-1 overflow-hidden">
          <div class="card-header border-secondary py-2 px-3 d-flex justify-content-between align-items-center">
            <span class="text-info fw-semibold small"><i class="bi bi-braces me-1"></i>Parsed Structure</span>
            <div class="d-flex gap-1" id="typeLegend"></div>
          </div>
          <div id="emptyState" class="d-flex flex-column align-items-center justify-content-center text-secondary" style="height:calc(100% - 41px)">
            <i class="bi bi-diagram-3 display-5 opacity-25 mb-2"></i>
            <small class="opacity-50">Tree will appear here</small>
          </div>
          <div class="tree-scroll px-3 py-2 d-none" id="treeContainer">
            <ul class="tree-ul root small font-monospace" id="treeRoot"></ul>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="appToast" class="toast align-items-center text-bg-success border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body fw-semibold" id="toastMsg">Done!</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let parsedData = null;

    // ─────────────────────────────────────────
    // PREFS — load from localStorage
    // ─────────────────────────────────────────
    const PREFS_KEY = 'jsonforge_prefs';

    function loadPrefs() {
      try { return JSON.parse(localStorage.getItem(PREFS_KEY)) || {}; } catch { return {}; }
    }
    function savePrefs(patch) {
      const prefs = { ...loadPrefs(), ...patch };
      localStorage.setItem(PREFS_KEY, JSON.stringify(prefs));
    }

    // ─────────────────────────────────────────
    // PAGE MODE (moon/sun) — dark | light
    // ─────────────────────────────────────────
    let pageMode = 'dark';

    function setPageMode(mode, save = true) {
      pageMode = mode;
      document.documentElement.setAttribute('data-bs-theme', mode);
      document.getElementById('modeIcon').className = mode === 'dark' ? 'bi bi-moon-fill' : 'bi bi-sun-fill';
      if (save) savePrefs({ pageMode: mode });

      // If editor theme is auto, sync it with page mode
      const sel = document.getElementById('themeSelect').value;
      if (sel === 'auto-dark' || sel === 'auto-light') {
        applyEditorThemeClass(mode === 'dark' ? 'dark' : 'light');
      }
    }

    function togglePageMode() {
      const next = pageMode === 'dark' ? 'light' : 'dark';
      setPageMode(next);

      // Also update select to reflect auto mode
      const sel = document.getElementById('themeSelect');
      if (sel.value === 'auto-dark' || sel.value === 'auto-light') {
        sel.value = next === 'dark' ? 'auto-dark' : 'auto-light';
        savePrefs({ editorTheme: sel.value });
      }
    }

    // ─────────────────────────────────────────
    // EDITOR THEME
    // ─────────────────────────────────────────
    const editorThemeClasses = ['theme-dark','theme-light','theme-monokai','theme-nord','theme-solarized'];
    const editorTargets = () => [
      document.getElementById('inputEditor'),
      document.getElementById('lineNums'),
      document.getElementById('treeContainer'),
      document.getElementById('emptyState'),
    ];

    function applyEditorThemeClass(cls) {
      editorTargets().forEach(el => {
        editorThemeClasses.forEach(c => el.classList.remove(c));
        el.classList.add('theme-' + cls);
      });
    }

    function resolveEditorTheme(val) {
      // auto values follow page mode
      if (val === 'auto-dark')  return 'dark';
      if (val === 'auto-light') return 'light';
      return val;
    }

    function applyEditorTheme(val) {
      applyEditorThemeClass(resolveEditorTheme(val));
    }

    function onEditorThemeChange() {
      const val = document.getElementById('themeSelect').value;
      savePrefs({ editorTheme: val });
      applyEditorTheme(val);
    }

    // ─────────────────────────────────────────
    // BOOT — restore saved prefs
    // ─────────────────────────────────────────
    (function boot() {
      const prefs = loadPrefs();

      // Restore page mode
      const savedMode = prefs.pageMode || 'dark';
      pageMode = savedMode;
      document.documentElement.setAttribute('data-bs-theme', savedMode);
      document.getElementById('modeIcon').className = savedMode === 'dark' ? 'bi bi-moon-fill' : 'bi bi-sun-fill';

      // Restore editor theme select
      const savedEditor = prefs.editorTheme || (savedMode === 'dark' ? 'auto-dark' : 'auto-light');
      document.getElementById('themeSelect').value = savedEditor;
      applyEditorTheme(savedEditor);

      // Restore saved JSON content
      const savedContent = localStorage.getItem('jsonforge_content');
      if (savedContent) {
        document.getElementById('inputEditor').value = savedContent;
        updateLineNums(savedContent);
        onInput();
      }
    })();

    // ─────────────────────────────────────────
    // CORE
    // ─────────────────────────────────────────
    function onInput() {
      const raw = document.getElementById('inputEditor').value;
      localStorage.setItem('jsonforge_content', raw);
      updateCounts(raw);
      updateLineNums(raw);
      const trimmed = raw.trim();
      if (!trimmed) { parsedData = null; clearTree(); setStatus('waiting'); return; }
      try {
        parsedData = JSON.parse(trimmed);
        buildTree(parsedData);
        hideError(); setStatus('valid');
      } catch (e) {
        parsedData = null;
        clearTree(); showError(e.message); setStatus('invalid');
      }
    }

    function updateLineNums(text) {
      const count = text ? text.split('\n').length : 1;
      const nums = Array.from({length: count}, (_, i) => i + 1).join('\n');
      document.getElementById('lineNums').textContent = nums;
    }

    function syncLineScroll() {
      const ta = document.getElementById('inputEditor');
      document.getElementById('lineNums').scrollTop = ta.scrollTop;
    }

    // ─────────────────────────────────────────
    // TREE
    // ─────────────────────────────────────────
    function buildTree(data) {
      const root = document.getElementById('treeRoot');
      root.innerHTML = '';
      root.appendChild(makeNode(data, null, false));
      document.getElementById('emptyState').classList.add('d-none');
      document.getElementById('treeContainer').classList.remove('d-none');
      document.getElementById('nodeCount').textContent = `${root.querySelectorAll('li').length} nodes`;
      buildLegend(data);
    }

    function makeNode(value, key, isArrItem) {
      const li = document.createElement('li');
      li.className = 'py-px';
      const idxBadge = isArrItem
        ? `<span class="badge bg-secondary bg-opacity-50 text-secondary me-1" style="font-size:10px">[${key}]</span>`
        : '';
      const keySpan = (!isArrItem && key !== null)
        ? `<span class="val-key">${escHtml(String(key))}</span><span class="text-secondary">: </span>`
        : '';
      if (value === null) {
        li.innerHTML = idxBadge + keySpan + `<span class="val-null">null</span> ${mkBadge('null','bg-secondary')}`;
      } else if (Array.isArray(value)) {
        li.appendChild(makeCollapsible(value, idxBadge + keySpan, true));
      } else if (typeof value === 'object') {
        li.appendChild(makeCollapsible(value, idxBadge + keySpan, false));
      } else if (typeof value === 'string') {
        li.innerHTML = idxBadge + keySpan + `<span class="val-str">"${escHtml(value)}"</span> ${mkBadge('string','bg-info text-dark')}`;
      } else if (typeof value === 'number') {
        li.innerHTML = idxBadge + keySpan + `<span class="val-num">${value}</span> ${mkBadge('number','bg-warning text-dark')}`;
      } else if (typeof value === 'boolean') {
        li.innerHTML = idxBadge + keySpan + `<span class="val-bool">${value}</span> ${mkBadge('bool','bg-danger')}`;
      }
      return li;
    }

    function makeCollapsible(value, keySpan, isArr) {
      const wrap = document.createElement('div');
      const keys = Object.keys(value);
      const open = isArr ? '[' : '{', close = isArr ? ']' : '}';
      const typeCls = isArr ? 'bg-success' : 'bg-primary';
      const typeLabel = isArr ? 'array' : 'object';

      const toggleDiv = document.createElement('div');
      toggleDiv.className = 'tree-toggle d-flex align-items-center gap-1 open';
      toggleDiv.innerHTML = `
        <span class="caret">&#9658;</span>${keySpan}
        <span class="text-secondary">${open}</span>
        <span class="badge ${typeCls} ms-1" style="font-size:10px">${typeLabel}</span>
        <span class="badge bg-secondary bg-opacity-50 text-secondary ms-1" style="font-size:10px">${keys.length} ${isArr?'items':'keys'}</span>
        <span class="text-secondary collapse-hint small ms-1 opacity-50"></span>`;
      toggleDiv.onclick = () => toggleNode(toggleDiv, childrenDiv, closeSpan, isArr, value);

      const childrenDiv = document.createElement('div');
      childrenDiv.className = 'tree-children mt-1';
      const ul = document.createElement('ul');
      ul.className = 'tree-ul';
      keys.forEach((k, i) => {
        ul.appendChild(makeNode(value[k], isArr ? i : k, isArr));
      });
      childrenDiv.appendChild(ul);

      const closeSpan = document.createElement('div');
      closeSpan.className = 'text-secondary ps-1';
      closeSpan.textContent = close;

      wrap.appendChild(toggleDiv);
      wrap.appendChild(childrenDiv);
      wrap.appendChild(closeSpan);
      return wrap;
    }

    function toggleNode(toggle, children, closeSpan, isArr, value) {
      const isOpen = toggle.classList.contains('open');
      toggle.classList.toggle('open', !isOpen);
      if (isOpen) {
        children.classList.add('d-none');
        closeSpan.classList.add('d-none');
        const preview = Array.isArray(value)
          ? value.slice(0,3).map(v=>typeof v==='object'?(Array.isArray(v)?'[…]':'{…}'):JSON.stringify(v)).join(', ')+(value.length>3?', …':'')
          : Object.keys(value).slice(0,3).map(k=>`${k}: …`).join(', ')+(Object.keys(value).length>3?', …':'');
        toggle.querySelector('.collapse-hint').textContent = preview+(isArr?' ]':' }');
      } else {
        children.classList.remove('d-none');
        closeSpan.classList.remove('d-none');
        toggle.querySelector('.collapse-hint').textContent = '';
      }
    }

    function expandAll() {
      document.querySelectorAll('.tree-toggle').forEach(t => {
        if (!t.classList.contains('open')) {
          t.parentElement.querySelectorAll(':scope > div').forEach(d => d.classList.remove('d-none'));
          t.classList.add('open');
          t.querySelector('.collapse-hint').textContent = '';
        }
      });
    }

    function collapseAll() {
      document.querySelectorAll('.tree-toggle').forEach(t => {
        if (t.classList.contains('open')) t.click();
      });
    }

    function buildLegend(data) {
      const stats = { string:0, number:0, boolean:0, null:0, object:0, array:0 };
      countTypes(data, stats);
      const legend = document.getElementById('typeLegend');
      legend.innerHTML = '';
      const cfg = { string:'bg-info text-dark', number:'bg-warning text-dark', boolean:'bg-danger', null:'bg-secondary', object:'bg-primary', array:'bg-success' };
      Object.entries(stats).forEach(([type, count]) => {
        if (!count) return;
        const b = document.createElement('span');
        b.className = `badge ${cfg[type]}`;
        b.title = `${count} ${type}${count>1?'s':''}`;
        b.textContent = `${type[0].toUpperCase()}: ${count}`;
        legend.appendChild(b);
      });
    }

    function countTypes(val, stats) {
      if (val === null)            { stats.null++;   return; }
      if (Array.isArray(val))      { stats.array++;  val.forEach(v => countTypes(v, stats)); return; }
      if (typeof val === 'object') { stats.object++; Object.values(val).forEach(v => countTypes(v, stats)); return; }
      stats[typeof val] = (stats[typeof val]||0) + 1;
    }

    // ─────────────────────────────────────────
    // TOOLBAR
    // ─────────────────────────────────────────
    function formatJSON() {
      const raw = document.getElementById('inputEditor').value.trim();
      if (!raw) return;
      try {
        const p = JSON.parse(raw);
        const formatted = JSON.stringify(p, null, 2);
        document.getElementById('inputEditor').value = formatted;
        parsedData = p; buildTree(p); hideError(); setStatus('valid');
        updateCounts(formatted); updateLineNums(formatted);
      } catch (e) { showError(e.message); setStatus('invalid'); }
    }

    function minifyJSON() {
      const raw = document.getElementById('inputEditor').value.trim();
      if (!raw) return;
      try {
        const p = JSON.parse(raw);
        const min = JSON.stringify(p);
        document.getElementById('inputEditor').value = min;
        parsedData = p; buildTree(p); hideError(); setStatus('valid');
        updateCounts(min); updateLineNums(min);
      } catch (e) { showError(e.message); setStatus('invalid'); }
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('appToast');
      t.className = `toast align-items-center text-bg-${type} border-0`;
      document.getElementById('toastMsg').textContent = msg;
      bootstrap.Toast.getOrCreateInstance(t, { delay: 2000 }).show();
    }

    function copyInput() {
      const text = document.getElementById('inputEditor').value;
      if (!text) { showToast('Nothing to copy', 'warning'); return; }
      navigator.clipboard.writeText(text)
        .then(() => showToast('✓ Copied to clipboard!'))
        .catch(() => showToast('Copy failed', 'danger'));
    }

    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        if (text) {
          document.getElementById('inputEditor').value = text;
          onInput();
          showToast('✓ Pasted from clipboard!');
        } else {
          showToast('Clipboard is empty', 'warning');
        }
      } catch (_) {
        showToast('Clipboard access denied — use Ctrl+V in editor', 'danger');
      }
    }

    function clearAll() {
      document.getElementById('inputEditor').value = '';
      localStorage.removeItem('jsonforge_content');
      parsedData = null; clearTree(); hideError(); setStatus('waiting'); updateCounts(''); updateLineNums('');
    }

    function uploadFile(e) {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => { document.getElementById('inputEditor').value = ev.target.result; onInput(); };
      reader.readAsText(file); e.target.value = '';
    }

    // ─────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────
    function clearTree() {
      document.getElementById('treeRoot').innerHTML = '';
      document.getElementById('treeContainer').classList.add('d-none');
      document.getElementById('emptyState').classList.remove('d-none');
      document.getElementById('nodeCount').textContent = '—';
      document.getElementById('typeLegend').innerHTML = '';
    }

    function mkBadge(label, cls) {
      return `<span class="badge ${cls} ms-1" style="font-size:10px">${label}</span>`;
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorBanner').classList.remove('d-none');
    }
    function hideError() { document.getElementById('errorBanner').classList.add('d-none'); }

    function setStatus(state) {
      const b = document.getElementById('statusBadge'), t = document.getElementById('statusText');
      b.className = 'badge';
      if (state === 'valid')        { b.classList.add('text-bg-success');   t.textContent = 'Valid JSON'; }
      else if (state === 'invalid') { b.classList.add('text-bg-danger');    t.textContent = 'Invalid JSON'; }
      else                          { b.classList.add('text-bg-secondary'); t.textContent = 'Waiting'; }
    }

    function updateCounts(str) {
      document.getElementById('lineCount').textContent = `Lines: ${str ? str.split('\n').length : 0}`;
      document.getElementById('charCount').textContent = `Chars: ${str.length}`;
    }
  </script>
</body>
</html>
